<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kaibetschart.com</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="overlays.css">
    <link rel="stylesheet" href="projects.css">
    <link rel="icon" href="icn/bts.gif" type="image/gif">
</head>

<body>
    <a href="index.html" class="menu-head">
        <div class="menu-sidebar">
            <div class="arrow-left"></div>
            <div href="visual-works.html" class="menu-home">Go back</div>
        </div>
    </a>
    <div class="contact">
        <div class="contact-container" style="margin-top: 0px !important;">
            <div class=""  >Contact</div> <br>
            <div>Send me an E-Mail at <a style="display: inline !important;"
                    href="mailto:betschart.kaai@gmail.com">betschart.kaai@gmail.com</a> <br> or use the contact form
                below.</div> <br>
            <form id="contact-form">
                <p>Name</p>
                <input type="text" name="user_name" required />
                <p>E-Mail</p>
                <input type="email" name="user_email" required />
                <p>Subject</p>
                <input type="subject" name="subject" required />
                <p>Message</p>
                <textarea name="message"></textarea>
                <button type="submit">Send</button>
            </form>
            <div id="status"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>

    <script>
        (function () {
            emailjs.init("ICG9lWozHI-h3Ry2t");
        })();

        const form = document.getElementById("contact-form");
        const status = document.getElementById("status");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            status.innerText = "Sending...";

            emailjs.sendForm(
                "service_u6tb9op",
                "template_9ehghbl",
                this
            )
                .then(() => {
                    status.innerText = "Message sent successfully.";
                    form.reset();
                })
                .catch((error) => {
                    status.innerText = "Failed to send message.";
                    console.error(error);
                });
        });



    </script>

</body>


</html>
